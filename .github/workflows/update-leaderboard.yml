name: Update All Leaderboards
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  update-leaderboards:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      # ==========================================
      # 1. משיכת לידרבורד תורמים (Node.js + Puppeteer)
      # ==========================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Install Node dependencies and run scrapers
        run: |
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth
          node fetch-leaderboard.js
          node sub_scraper.js
 
      # ==========================================
      # 2. משיכת נתוני לידרבורדים הימורים (Python)
      # ==========================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
 
      - name: Install Python dependencies
        run: pip install requests
 
      - name: Run Fetch Script for Wager Leaderboards
        run: python fetch_data.py
 
      # ==========================================
      # 3. בדיקת סטטוס לייב (Kick Official API - OAuth)
      # ==========================================
      - name: Check Kick Live Status
        env:
          KICK_CLIENT_ID: ${{ secrets.KICK_CLIENT_ID }}
          KICK_CLIENT_SECRET: ${{ secrets.KICK_CLIENT_SECRET }}
        run: python check_kick_live.py
 
      # ==========================================
      # 4. שמירה ודחיפה של כל הקבצים לאתר
      # ==========================================
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add leaderboard.json subs.json data/
          git commit -m "Auto-update Kick, Wager leaderboards, and Live Status" || echo "No changes to commit"
          git push
 
