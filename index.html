<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RonenGG | Official Links</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap');

  :root{
    --bg: #0a0a0a;
    --card: #141414;
    --card-hover: #1c1c1c;
    --border: #262626;
    --purple: #9146ff;
    --purple-dim: rgba(145,70,255,0.15);
    --text: #f2f2f2;
    --text-dim: #9c9c9c;
  }

  *{ box-sizing: border-box; margin: 0; padding: 0; }

  html, body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Rubik', sans-serif;
    min-height: 100vh;
  }

  body{
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 32px;
    background-image:
      radial-gradient(circle at 50% 0%, rgba(145,70,255,0.10), transparent 55%);
  }

  .avatar-wrap{
    position: relative;
    width: 104px;
    height: 104px;
    margin-bottom: 18px;
  }

  .avatar{
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--purple);
    background: var(--card);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    font-weight: 900;
    color: var(--purple);
  }

  .live-dot{
    position: absolute;
    bottom: 4px;
    left: 4px;
    width: 16px;
    height: 16px;
    background: var(--purple);
    border: 3px solid var(--bg);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse{
    0%{ box-shadow: 0 0 0 0 rgba(145,70,255,0.55); }
    70%{ box-shadow: 0 0 0 8px rgba(145,70,255,0); }
    100%{ box-shadow: 0 0 0 0 rgba(145,70,255,0); }
  }

  h1{
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 0.5px;
  }

  .tagline{
    color: var(--text-dim);
    font-size: 14px;
    margin-top: 4px;
    margin-bottom: 28px;
  }

  nav{
    display: flex;
    gap: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px;
    margin-bottom: 32px;
  }

  nav a{
    text-decoration: none;
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 999px;
    transition: all 0.2s ease;
  }

  nav a.active{
    background: var(--purple);
    color: #f5f0ff;
    font-weight: 700;
  }

  nav a:not(.active):hover{
    color: var(--text);
    background: var(--card-hover);
  }

  main{
    width: 100%;
    max-width: 420px;
  }

  .links{
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-card{
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }

  .link-card:hover{
    transform: translateY(-2px);
    border-color: var(--purple);
    background: var(--card-hover);
  }

  .link-icon{
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--purple-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--purple);
    font-size: 20px;
    font-weight: 700;
  }

  .link-text{
    display: flex;
    flex-direction: column;
    text-align: right;
    flex: 1;
  }

  .link-title{
    font-weight: 700;
    font-size: 15px;
  }

  .link-sub{
    font-size: 12.5px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .link-arrow{
    color: var(--text-dim);
    font-size: 18px;
  }

  .status-badge{
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    color: var(--purple);
    background: var(--purple-dim);
    padding: 3px 9px;
    border-radius: 999px;
    margin-top: 10px;
  }

  .status-badge .dot{
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--purple);
  }

  footer{
    margin-top: 40px;
    color: var(--text-dim);
    font-size: 12px;
    text-align: center;
  }

  footer a{
    color: var(--text-dim);
    text-decoration: underline;
  }

  @keyframes fadeSlideUp{
    from{ opacity: 0; transform: translateY(16px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  .avatar-wrap, h1, .tagline, .status-badge, nav{
    opacity: 0;
    animation: fadeSlideUp 0.6s ease forwards;
  }

  .avatar-wrap{ animation-delay: 0.05s; }
  h1{ animation-delay: 0.15s; }
  .tagline{ animation-delay: 0.22s; }
  .status-badge{ animation-delay: 0.28s; }
  nav{ animation-delay: 0.35s; }

  .link-card{
    opacity: 0;
    animation: fadeSlideUp 0.5s ease forwards;
  }

  .link-card:nth-child(1){ animation-delay: 0.45s; }
  .link-card:nth-child(2){ animation-delay: 0.53s; }
  .link-card:nth-child(3){ animation-delay: 0.61s; }
  .link-card:nth-child(4){ animation-delay: 0.69s; }
  .link-card:nth-child(5){ animation-delay: 0.77s; }

  footer{
    opacity: 0;
    animation: fadeSlideUp 0.5s ease forwards;
    animation-delay: 0.9s;
  }

  @media (prefers-reduced-motion: reduce){
    .avatar-wrap, h1, .tagline, .status-badge, nav, .link-card, footer, .live-dot{
      animation: none !important;
      opacity: 1 !important;
    }
  }
</style>
</head>
<body>

      <a class="link-card" href="https://www.youtube.com/@RonenGG" target="_blank" rel="noopener">

  </main>

  <footer>

</body>
</html>
